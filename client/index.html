<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Castles of Light — AI Infrastructure Architect</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Umami Analytics — only loads when env vars are defined
      (function() {
        var endpoint = '%VITE_ANALYTICS_ENDPOINT%';
        var websiteId = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (endpoint && !endpoint.includes('VITE_ANALYTICS') && websiteId && !websiteId.includes('VITE_ANALYTICS')) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = endpoint + '/umami';
          s.setAttribute('data-website-id', websiteId);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
